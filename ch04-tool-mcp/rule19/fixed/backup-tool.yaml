# 修正後: 絶対パスを inputSchema で required + 先頭 `/` 強制

name: backup_files
description: |
  指定ディレクトリのファイルを backup ディレクトリにコピーする。
  source_dir は必ず先頭が `/` の絶対パス。相対パスを渡された場合はエラーで失敗する。
inputSchema:
  type: object
  properties:
    source_dir:
      type: string
      description: バックアップ元ディレクトリの絶対パス (例 /Users/dev/project/data)
      pattern: "^/"
    backup_label:
      type: string
      description: バックアップのラベル (timestamped subdirectory に使われる)
  required: [source_dir, backup_label]

# 内部実装 (擬似コード):
