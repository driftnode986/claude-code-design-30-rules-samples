#       `Use $CLAUDE_PROJECT_DIR or pwd to construct the absolute path.`
#     )
#   }
#   const src = input.source_dir
#   const dst = `/var/backups/${input.backup_label}-${Date.now()}`
#   fs.cpSync(src, dst, { recursive: true })
#
# 利点:
# - inputSchema の pattern `^/` で JSON Schema validation 段階で reject
# - サーバー側の path.isAbsolute() で二重防御
